name: Build APK

# Trigger on every push to any branch
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout code from repository
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # Step 2: Setup Java (required for Gradle)
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # Step 3: Make Gradle wrapper executable
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # Step 4: Build Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # Step 5: Build Release APK (unsigned)
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    # Step 6: Upload Debug APK as artifact
    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: focusapp-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    # Step 7: Upload Release APK as artifact
    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: focusapp-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk


    # Step 8: List APK files
    - name: List Generated APKs
      if: always()
      run: |
        echo "✅ Debug APK:"
        ls -lh app/build/outputs/apk/debug/ || echo "Not found"
        echo ""
        echo "✅ Release APK:"
        ls -lh app/build/outputs/apk/release/ || echo "Not found"

    # Step 9: Create release summary
    - name: Build Summary
      if: always()
      run: |
        echo "📱 FocusApp Build Complete!"
        echo "=========================="
        echo "✅ Debug APK: app-debug.apk"
        echo "✅ Release APK: app-release-unsigned.apk"
        echo ""
        echo "Download from: Actions → Build APK → Artifacts"
