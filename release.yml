name: Release APK

# Trigger when you create a new release or tag
on:
  push:
    tags:
      - 'v*'  # This matches any tag starting with 'v' like v1.0.0
  workflow_dispatch:  # Manual trigger from GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    # Get version from tag
    - name: Get Version
      id: version
      run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

    # Create GitHub Release
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
        body: |
          # FocusApp Release ${{ steps.version.outputs.version }}
          
          ## What's New
          - Focus app with 6 features
          - Background app monitoring
          - Mini-games for motivation
          - Beautiful UI with Material Design 3
          
          ## Installation
          1. Download the APK file below
          2. Enable "Unknown Sources" in Settings
          3. Install the APK
          4. Enable Accessibility Service in app settings
          5. Create your first focus schedule!
          
          ## Features
          ✅ Focus time scheduling (up to 10)
          ✅ App blocking during focus
          ✅ 6 motivational warnings
          ✅ Mini-games (Memory, Math, Flappy Bird)
          ✅ Usage analytics
          ✅ Beautiful dark theme
          
          Happy focusing! 💪
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
