<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Bird - Focus Break</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-display {
            font-size: 24px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .timer-display {
            font-size: 24px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 20px;
            margin: 10px 0;
            color: #ccc;
        }

        .game-over-content .final-score {
            font-size: 48px;
            color: #4caf50;
            margin: 30px 0;
            font-weight: bold;
        }

        .game-over-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: #4caf50;
            color: white;
        }

        .restart-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .exit-btn {
            background: #f44336;
            color: white;
        }

        .exit-btn:hover {
            background: #da190b;
            transform: scale(1.05);
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            color: white;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .start-content p {
            font-size: 18px;
            margin: 15px 0;
            color: #ddd;
        }

        .start-content .instruction {
            font-size: 24px;
            margin: 30px 0;
            color: #4caf50;
        }

        .tap-instruction {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .bird-emoji {
            font-size: 64px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="score-display">🏆 <span id="score">0</span></div>
            <div class="timer-display">⏱️ <span id="timer">02:00</span></div>
        </div>

        <div class="start-screen" id="startScreen">
            <div class="start-content">
                <div class="bird-emoji">🐦</div>
                <h1>Focus Bird</h1>
                <p>Avoid the pipes and stay focused!</p>
                <div class="instruction tap-instruction">TAP TO START</div>
                <p style="font-size: 14px; color: #999; margin-top: 30px;">
                    Get 5 points to win or survive 2 minutes!
                </p>
            </div>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-content">
                <h1 id="gameOverTitle">Game Over!</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <div class="final-score" id="gameOverMessage">Try again!</div>
                <div class="game-over-buttons">
                    <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
                    <button class="exit-btn" onclick="exitGame()">✕ Back to Focus</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 120;
        const PIPE_SPACING = 200;
        const GRAVITY = 0.6;
        const JUMP_STRENGTH = -12;
        const GAME_DURATION = 120; // 2 minutes

        // Game state
        let gameState = 'start'; // start, playing, gameOver
        let bird = {
            x: 50,
            y: 150,
            width: 30,
            height: 30,
            velocity: 0
        };

        let pipes = [];
        let score = 0;
        let gameStartTime = null;
        let gameEndTime = null;
        let pipeCounter = 0;

        // Set canvas size
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing') {
                update();
                draw();
            } else if (gameState === 'start') {
                drawStart();
            } else if (gameState === 'gameOver') {
                drawGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Time check
            const elapsed = (Date.now() - gameStartTime) / 1000;
            if (elapsed >= GAME_DURATION) {
                endGame(true); // Won by time
                return;
            }

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Check bounds
            if (bird.y - bird.height / 2 < 0 || bird.y + bird.height / 2 > canvas.height) {
                endGame(false);
                return;
            }

            // Generate pipes
            pipeCounter++;
            if (pipeCounter > PIPE_SPACING) {
                const gapStart = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    gapStart: gapStart,
                    gapEnd: gapStart + PIPE_GAP,
                    passed: false
                });
                pipeCounter = 0;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= 5; // Pipe speed

                // Check collision
                if (
                    bird.x + bird.width / 2 > pipe.x &&
                    bird.x - bird.width / 2 < pipe.x + PIPE_WIDTH
                ) {
                    if (
                        bird.y - bird.height / 2 < pipe.gapStart ||
                        bird.y + bird.height / 2 > pipe.gapEnd
                    ) {
                        endGame(false);
                        return;
                    }
                }

                // Score point when passing pipe
                if (!pipe.passed && bird.x > pipe.x + PIPE_WIDTH) {
                    pipe.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;

                    // Win condition
                    if (score >= 5) {
                        endGame(true);
                        return;
                    }
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Update timer
            const remaining = Math.max(0, GAME_DURATION - Math.floor(elapsed));
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            document.getElementById('timer').textContent = 
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function draw() {
            // Draw ground
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Draw pipes
            ctx.fillStyle = '#2ecc71';
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.gapStart);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.gapEnd, PIPE_WIDTH, canvas.height - pipe.gapEnd);
            });

            // Draw bird
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // Bird eye
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bird.x + 5, bird.y - 5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Score
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';
            ctx.textShadow = '2px 2px 4px rgba(0, 0, 0, 0.5)';
        }

        function drawStart() {
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function drawGameOver() {
            document.getElementById('gameOverScreen').classList.add('active');
        }

        function startGame() {
            gameState = 'playing';
            gameStartTime = Date.now();
            pipes = [];
            pipeCounter = 0;
            bird.y = 150;
            bird.velocity = 0;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('active');
        }

        function endGame(won) {
            gameState = 'gameOver';
            gameEndTime = Date.now();

            if (won) {
                if (score >= 5) {
                    document.getElementById('gameOverTitle').textContent = '🎉 YOU WON!';
                    document.getElementById('gameOverMessage').textContent = 'You cleared 5 pipes! Great focus! 🧠';
                } else {
                    document.getElementById('gameOverTitle').textContent = '⏱️ TIME\'S UP!';
                    document.getElementById('gameOverMessage').textContent = 'You made it 2 minutes! Well done! 💪';
                }
            } else {
                document.getElementById('gameOverTitle').textContent = 'CRASH! 💥';
                document.getElementById('gameOverMessage').textContent = 'Don\'t give up! Try again!';
            }

            document.getElementById('finalScore').textContent = score;
        }

        function restartGame() {
            score = 0;
            document.getElementById('score').textContent = score;
            startGame();
        }

        function exitGame() {
            if (typeof Android !== 'undefined') {
                Android.exitGame();
            } else {
                alert(`Game ended! You scored ${score} points. Go focus! 💪`);
            }
        }

        // Input handling
        document.addEventListener('click', () => {
            if (gameState === 'start') {
                startGame();
            } else if (gameState === 'playing') {
                bird.velocity = JUMP_STRENGTH;
            }
        });

        document.addEventListener('touchstart', () => {
            if (gameState === 'start') {
                startGame();
            } else if (gameState === 'playing') {
                bird.velocity = JUMP_STRENGTH;
            }
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
